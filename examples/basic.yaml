# =============================================================================
# Ulanzi D200 — Basic Example
# =============================================================================
#
# Two-page setup demonstrating the most common patterns:
#   - Toggle switches with two-state display (on/off)
#   - Momentary action buttons
#   - Page navigation (next, prev, jump)
#   - Home Assistant state sync (bidirectional)
#   - Global status bar on the double-wide button (position 13)
#
# Page layout (5 cols × 3 rows; button 13 is double-wide):
#
#   Row 0:  [ 0] [ 1] [ 2] [ 3] [ 4]
#   Row 1:  [ 5] [ 6] [ 7] [ 8] [ 9]
#   Row 2:  [10] [11] [12] [13 ══════]
#
# Pages:
#   Page  0 — Home     (lights, fan, thermostat, garage door)
#   Page  1 — Media    (play/pause, volume, track skip)
#   Page -1 — Global   (navigation + status bar, all pages)
#
# Hardware: Seeed XIAO ESP32-C3 (any ESP32 with 2 free UART pins works)
# =============================================================================

substitutions:
  device_name: ulanzi-d200
  friendly_name: "Ulanzi D200"
  # Adjust pins for your board. XIAO ESP32-C3 defaults:
  uart_tx_pin: GPIO21
  uart_rx_pin: GPIO20
  uart_baud_rate: "1500000"

esphome:
  name: ${device_name}
  comment: "Ulanzi D200 stream deck bridge"

esp32:
  board: seeed_xiao_esp32c3
  variant: ESP32C3
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"

logger:
  level: INFO
  baud_rate: 0   # XIAO C3 uses USB CDC for debug output; disable UART logging

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

uart:
  id: uart_bus
  tx_pin: ${uart_tx_pin}
  rx_pin: ${uart_rx_pin}
  baud_rate: ${uart_baud_rate}
  data_bits: 8
  parity: NONE
  stop_bits: 1

external_components:
  - source: github://mapero/esphome-ulanzi-d200
    components: [ulanzi_d200]

# =============================================================================
# Bridge Component
# =============================================================================
ulanzi_d200:
  id: d200
  uart_id: uart_bus

  on_connected:
    then:
      - logger.log: "D200 connected"
      - delay: 500ms
      - lambda: |-
          id(d200).set_brightness(80);
          id(d200).send_command("page", "rename", "0", "Home");
          id(d200).send_command("page", "rename", "1", "Media");

  on_disconnected:
    then:
      - logger.log: "D200 disconnected"

  on_page_change:
    then:
      - lambda: |-
          id(current_page_sensor).publish_state(page);

  on_mode_change:
    then:
      - lambda: |-
          ESP_LOGI("d200", "Mode changed to: %s", mode.c_str());

  sections:

    # =========================================================================
    # PAGE 0: Home
    # =========================================================================

    # Position 0 — Living Room Light
    # Toggle switch: two layouts driven by HA entity state
    - position: 0
      page: 0
      on_press:
        then:
          - switch.toggle: sw_living_room_light
      pressed_style:
        color: "#FF8800"
        icon_color: "#000000"
        text_color: "#000000"
      layouts:
        - widget: entity_view
          when: !lambda 'return id(sw_living_room_light).state;'
          color: "#FFAA00"
          icon_id: "ceiling-light"
          icon_color: "#000000"
          text: "ON"
          text_color: "#000000"
          text2: "Living Room"
          text2_color: "#332200"
        - widget: entity_view
          color: "#2A2010"
          icon_id: "ceiling-light-outline"
          icon_color: "#AA7733"
          text: "OFF"
          text_color: "#AA7733"
          text2: "Living Room"
          text2_color: "#664422"

    # Position 1 — Bedroom Fan
    - position: 1
      page: 0
      on_press:
        then:
          - switch.toggle: sw_bedroom_fan
      pressed_style:
        color: "#6666FF"
        icon_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          when: !lambda 'return id(sw_bedroom_fan).state;'
          color: "#4444FF"
          icon_id: "fan"
          icon_color: "#FFFFFF"
          text: "ON"
          text_color: "#FFFFFF"
          text2: "Bedroom"
          text2_color: "#AAAAFF"
        - widget: entity_view
          color: "#1A1A33"
          icon_id: "fan-off"
          icon_color: "#5555AA"
          text: "OFF"
          text_color: "#7777CC"
          text2: "Bedroom"
          text2_color: "#3A3A77"

    # Position 2 — Thermostat (display only, press to toggle eco mode)
    - position: 2
      page: 0
      on_press:
        then:
          - switch.toggle: sw_eco_mode
      pressed_style:
        color: "#44AAFF"
        icon_color: "#FFFFFF"
        text_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          when: !lambda 'return id(sw_eco_mode).state;'
          color: "#1A2E3A"
          icon_id: "leaf"
          icon_color: "#44CC88"
          text: "Eco"
          text_color: "#44CC88"
          text2: "Thermostat"
          text2_color: "#2A6644"
        - widget: entity_view
          color: "#2A1A1A"
          icon_id: "thermometer"
          icon_color: "#FF8844"
          text: !lambda |-
            if (id(ha_thermostat_temp).has_state() && !isnan(id(ha_thermostat_temp).state)) {
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f C", id(ha_thermostat_temp).state);
              return {std::string(buf)};
            }
            return {std::string("-- C")};
          text_color: "#FF8844"
          text2: "Thermostat"
          text2_color: "#884422"

    # Position 3 — Garage Door (momentary: one press toggles open/closed)
    - position: 3
      page: 0
      on_press:
        then:
          - button.press: btn_garage_door
      on_release:
        then:
          - lambda: ESP_LOGD("d200", "Garage button released");
      pressed_style:
        color: "#FF6600"
        icon_color: "#FFFFFF"
        text_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          when: !lambda 'return id(ha_garage_open).state;'
          color: "#FF6600"
          icon_id: "garage-open-variant"
          icon_color: "#FFFFFF"
          text: "OPEN"
          text_color: "#FFFFFF"
          text2: "Garage"
          text2_color: "#FFCCAA"
        - widget: entity_view
          color: "#2E1A0A"
          icon_id: "garage-variant"
          icon_color: "#AA6622"
          text: "CLOSED"
          text_color: "#AA6622"
          text2: "Garage"
          text2_color: "#664411"

    # =========================================================================
    # PAGE 1: Media
    # =========================================================================

    # Position 5 — Play / Pause
    - position: 5
      page: 1
      on_press:
        then:
          - switch.toggle: sw_media_playing
      pressed_style:
        color: "#44FF88"
        icon_color: "#000000"
      layouts:
        - widget: entity_view
          when: !lambda 'return id(sw_media_playing).state;'
          color: "#22AA55"
          icon_id: "pause-circle"
          icon_color: "#FFFFFF"
          text: "PAUSE"
          text_color: "#FFFFFF"
          text2: "Living Room"
          text2_color: "#AAFFCC"
        - widget: entity_view
          color: "#112211"
          icon_id: "play-circle"
          icon_color: "#44FF88"
          text: "PLAY"
          text_color: "#44FF88"
          text2: "Living Room"
          text2_color: "#226633"

    # Position 6 — Volume Down
    - position: 6
      page: 1
      on_press:
        then:
          - button.press: btn_vol_down
      pressed_style:
        color: "#6666FF"
        icon_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          color: "#1A1A33"
          icon_id: "volume-minus"
          icon_color: "#8888FF"
          text: "VOL -"
          text_color: "#AAAAFF"

    # Position 7 — Volume Up
    - position: 7
      page: 1
      on_press:
        then:
          - button.press: btn_vol_up
      pressed_style:
        color: "#6666FF"
        icon_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          color: "#1A1A33"
          icon_id: "volume-plus"
          icon_color: "#8888FF"
          text: "VOL +"
          text_color: "#AAAAFF"

    # Position 8 — Skip to Next Track
    - position: 8
      page: 1
      on_press:
        then:
          - button.press: btn_next_track
      pressed_style:
        color: "#6666FF"
        icon_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          color: "#1A1A33"
          icon_id: "skip-next"
          icon_color: "#8888FF"
          text: "NEXT"
          text_color: "#AAAAFF"

    # =========================================================================
    # GLOBAL (page: -1) — visible on every page
    # =========================================================================

    # Position 4 — Next Page
    - position: 4
      page: -1
      on_press:
        then:
          - lambda: id(d200).navigate_page_next();
      pressed_style:
        color: "#4444AA"
        icon_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          color: "#111122"
          icon_id: "chevron-right"
          icon_color: "#5555AA"
          text: "NEXT"
          text_color: "#7777CC"

    # Position 9 — Previous Page
    - position: 9
      page: -1
      on_press:
        then:
          - lambda: id(d200).navigate_page_prev();
      pressed_style:
        color: "#4444AA"
        icon_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          color: "#111122"
          icon_id: "chevron-left"
          icon_color: "#5555AA"
          text: "PREV"
          text_color: "#7777CC"

    # Position 10 — Jump to Home (highlighted when active)
    - position: 10
      page: -1
      on_press:
        then:
          - lambda: id(d200).navigate_page_jump(0);
      pressed_style:
        color: "#FF9944"
        icon_color: "#000000"
      layouts:
        - widget: entity_view
          when: !lambda 'return id(d200).get_current_page() == 0;'
          color: "#2A1A0A"
          icon_id: "home"
          icon_color: "#FF9944"
          text: "Home"
          text_color: "#FF9944"
        - widget: entity_view
          color: "#111111"
          icon_id: "home-outline"
          icon_color: "#444444"
          text: "Home"
          text_color: "#444444"

    # Position 11 — Jump to Media (highlighted when active)
    - position: 11
      page: -1
      on_press:
        then:
          - lambda: id(d200).navigate_page_jump(1);
      pressed_style:
        color: "#44AAFF"
        icon_color: "#000000"
      layouts:
        - widget: entity_view
          when: !lambda 'return id(d200).get_current_page() == 1;'
          color: "#0A1A2A"
          icon_id: "music-note"
          icon_color: "#44AAFF"
          text: "Media"
          text_color: "#44AAFF"
        - widget: entity_view
          color: "#111111"
          icon_id: "music-note-outline"
          icon_color: "#444444"
          text: "Media"
          text_color: "#444444"

    # Position 13 — Status Bar (double-wide, all pages)
    - position: 13
      page: -1
      layouts:
        - widget: status
          items:
            - clock
            - page
          color: "#111122"
          text_color: "#AACCFF"

# =============================================================================
# Template Switches
# Each switch calls a HA service and uses optimistic mode to update immediately.
# The homeassistant binary_sensor below keeps the switch in sync with real state.
# =============================================================================
switch:
  - platform: template
    id: sw_living_room_light
    name: "${friendly_name} Living Room Light"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - homeassistant.service:
          service: light.turn_on
          data:
            entity_id: light.living_room
    turn_off_action:
      - homeassistant.service:
          service: light.turn_off
          data:
            entity_id: light.living_room

  - platform: template
    id: sw_bedroom_fan
    name: "${friendly_name} Bedroom Fan"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - homeassistant.service:
          service: fan.turn_on
          data:
            entity_id: fan.bedroom
    turn_off_action:
      - homeassistant.service:
          service: fan.turn_off
          data:
            entity_id: fan.bedroom

  - platform: template
    id: sw_eco_mode
    name: "${friendly_name} Eco Mode"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - homeassistant.service:
          service: climate.set_preset_mode
          data:
            entity_id: climate.thermostat
            preset_mode: eco
    turn_off_action:
      - homeassistant.service:
          service: climate.set_preset_mode
          data:
            entity_id: climate.thermostat
            preset_mode: none

  - platform: template
    id: sw_media_playing
    name: "${friendly_name} Media Playing"
    optimistic: true
    restore_mode: RESTORE_DEFAULT_OFF
    turn_on_action:
      - homeassistant.service:
          service: media_player.media_play
          data:
            entity_id: media_player.living_room
    turn_off_action:
      - homeassistant.service:
          service: media_player.media_pause
          data:
            entity_id: media_player.living_room

# =============================================================================
# Template Buttons (momentary actions)
# =============================================================================
button:
  - platform: template
    id: btn_garage_door
    name: "${friendly_name} Garage Door"
    on_press:
      - homeassistant.service:
          service: cover.toggle
          data:
            entity_id: cover.garage_door

  - platform: template
    id: btn_vol_down
    name: "${friendly_name} Volume Down"
    on_press:
      - homeassistant.service:
          service: media_player.volume_down
          data:
            entity_id: media_player.living_room

  - platform: template
    id: btn_vol_up
    name: "${friendly_name} Volume Up"
    on_press:
      - homeassistant.service:
          service: media_player.volume_up
          data:
            entity_id: media_player.living_room

  - platform: template
    id: btn_next_track
    name: "${friendly_name} Next Track"
    on_press:
      - homeassistant.service:
          service: media_player.media_next_track
          data:
            entity_id: media_player.living_room

# =============================================================================
# HA State Sync — keep ESPHome switches in sync with real HA entity state
#
# This pattern creates a complete bidirectional loop:
#   User presses D200  →  on_press  →  switch.toggle  →  HA service call
#   HA state changes   →  binary_sensor triggers  →  switch updated  →  display refreshes
# =============================================================================
binary_sensor:
  - platform: homeassistant
    id: ha_living_room_light
    entity_id: light.living_room
    trigger_on_initial_state: true
    on_state:
      then:
        - lambda: |-
            if (x) id(sw_living_room_light).turn_on();
            else id(sw_living_room_light).turn_off();

  - platform: homeassistant
    id: ha_bedroom_fan
    entity_id: fan.bedroom
    trigger_on_initial_state: true
    on_state:
      then:
        - lambda: |-
            if (x) id(sw_bedroom_fan).turn_on();
            else id(sw_bedroom_fan).turn_off();

  - platform: homeassistant
    id: ha_garage_open
    entity_id: cover.garage_door
    trigger_on_initial_state: true

  - platform: homeassistant
    id: ha_media_playing
    entity_id: media_player.living_room
    trigger_on_initial_state: true
    on_state:
      then:
        - lambda: |-
            if (x) id(sw_media_playing).turn_on();
            else id(sw_media_playing).turn_off();

  - platform: template
    id: d200_connected
    name: "${friendly_name} Connected"
    device_class: connectivity
    lambda: 'return id(d200).is_connected();'

# =============================================================================
# Sensors
# =============================================================================
sensor:
  - platform: homeassistant
    id: ha_thermostat_temp
    entity_id: sensor.thermostat_current_temperature

  - platform: template
    id: current_page_sensor
    name: "${friendly_name} Current Page"
    icon: mdi:book-open-page-variant
    accuracy_decimals: 0
    lambda: 'return id(d200).get_current_page();'
    update_interval: 5s

  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 60s

# =============================================================================
# Display brightness control (exposed as a number entity in HA)
# =============================================================================
number:
  - platform: template
    name: "${friendly_name} Brightness"
    icon: mdi:brightness-6
    min_value: 0
    max_value: 100
    step: 10
    initial_value: 80
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: id(d200).set_brightness((uint8_t)x);
