# =============================================================================
# Ulanzi D200 — Sensor Dashboard Example
# =============================================================================
#
# A two-page sensor dashboard demonstrating all visualization widget types:
#   - gauge        radial arc filled proportionally between min and max
#   - line_graph   scrolling history plot
#   - entity_view  icon + two text lines (default, no graph)
#   - chips        grid of small icon+label badges
#   - status       built-in clock and page indicator (double-wide)
#
# Also demonstrates:
#   - Conditional widget-type switching (gauge ↔ entity_view based on state)
#   - Lambda graph_color (arc color changes based on value)
#   - All-pages sections (page: -1)
#
# Page layout (5 cols × 3 rows; button 13 is double-wide):
#
#   Row 0:  [ 0] [ 1] [ 2] [ 3] [ 4]
#   Row 1:  [ 5] [ 6] [ 7] [ 8] [ 9]
#   Row 2:  [10] [11] [12] [13 ══════]
#
# Pages:
#   Page 0 — Power     (server, solar, grid, UPS battery)
#   Page 1 — Climate   (temperatures, humidity, CO2)
#   Page -1 — Global   (navigation + status bar)
#
# Replace the sensor entity IDs in the `sensor:` section with your own.
#
# Hardware: Seeed XIAO ESP32-C3 (any ESP32 with 2 free UART pins works)
# =============================================================================

substitutions:
  device_name: ulanzi-d200
  friendly_name: "Ulanzi D200"
  uart_tx_pin: GPIO21
  uart_rx_pin: GPIO20
  uart_baud_rate: "1500000"

esphome:
  name: ${device_name}
  comment: "Ulanzi D200 sensor dashboard"

esp32:
  board: seeed_xiao_esp32c3
  variant: ESP32C3
  flash_size: 4MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "16384"

logger:
  level: INFO
  baud_rate: 0

api:
  encryption:
    key: !secret api_encryption_key
  reboot_timeout: 0s

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

uart:
  id: uart_bus
  tx_pin: ${uart_tx_pin}
  rx_pin: ${uart_rx_pin}
  baud_rate: ${uart_baud_rate}
  data_bits: 8
  parity: NONE
  stop_bits: 1

external_components:
  - source: github://mapero/esphome-ulanzi-d200
    components: [ulanzi_d200]

# =============================================================================
# Bridge Component
# =============================================================================
ulanzi_d200:
  id: d200
  uart_id: uart_bus

  on_connected:
    then:
      - delay: 500ms
      - lambda: |-
          id(d200).set_brightness(80);
          id(d200).send_command("page", "rename", "0", "Power");
          id(d200).send_command("page", "rename", "1", "Climate");

  sections:

    # =========================================================================
    # PAGE 0: Power
    # =========================================================================

    # Position 0 — Server Power
    # gauge: arc fills from 0 to max_watts proportionally
    - position: 0
      page: 0
      layouts:
        - widget: gauge
          min: 0.0
          max: 300.0
          value: !lambda |-
            if (id(ha_server_power).has_state() && !isnan(id(ha_server_power).state)) {
              char buf[16];
              snprintf(buf, sizeof(buf), "%.1f", id(ha_server_power).state);
              return {std::string(buf)};
            }
            return {std::string("0")};
          graph_color: "#FF8844"
          color: "#1A1A2E"
          icon_id: "server"
          icon_color: "#FF8844"
          text: "Server"
          text_color: "#FFFFFF"
          text2: !lambda |-
            if (id(ha_server_power).has_state() && !isnan(id(ha_server_power).state)) {
              char buf[16];
              float x = id(ha_server_power).state;
              if (x < 10) snprintf(buf, sizeof(buf), "%.1f W", x);
              else snprintf(buf, sizeof(buf), "%.0f W", x);
              return {std::string(buf)};
            }
            return {std::string("-- W")};
          text2_color: "#AAAAAA"

    # Position 1 — Solar Power
    # gauge with lambda graph_color: green when producing, grey at zero
    - position: 1
      page: 0
      layouts:
        - widget: gauge
          min: 0.0
          max: 5000.0
          value: !lambda |-
            if (id(ha_solar_power).has_state() && !isnan(id(ha_solar_power).state)) {
              char buf[16];
              snprintf(buf, sizeof(buf), "%.0f", id(ha_solar_power).state);
              return {std::string(buf)};
            }
            return {std::string("0")};
          graph_color: !lambda |-
            if (id(ha_solar_power).has_state() && id(ha_solar_power).state > 50)
              return {std::string("#FFCC00")};
            return {std::string("#444422")};
          color: "#1A1A2E"
          icon_id: "solar-power"
          icon_color: "#FFCC00"
          text: "Solar"
          text_color: "#FFFFFF"
          text2: !lambda |-
            if (id(ha_solar_power).has_state() && !isnan(id(ha_solar_power).state)) {
              char buf[16];
              float x = id(ha_solar_power).state;
              if (x >= 1000) snprintf(buf, sizeof(buf), "%.1f kW", x / 1000.0f);
              else snprintf(buf, sizeof(buf), "%.0f W", x);
              return {std::string(buf)};
            }
            return {std::string("-- W")};
          text2_color: "#AAAAAA"

    # Position 2 — Grid Power
    # entity_view: negative = exporting (green), positive = importing (red)
    - position: 2
      page: 0
      layouts:
        - widget: entity_view
          color: "#1A1A2E"
          icon_id: "transmission-tower"
          icon_color: !lambda |-
            if (id(ha_grid_power).has_state()) {
              return id(ha_grid_power).state < 0
                ? optional<std::string>{"#44FF88"}   // exporting
                : optional<std::string>{"#FF4444"};  // importing
            }
            return {std::string("#888888")};
          text: "Grid"
          text_color: "#FFFFFF"
          text2: !lambda |-
            if (id(ha_grid_power).has_state() && !isnan(id(ha_grid_power).state)) {
              char buf[16];
              float x = id(ha_grid_power).state;
              bool exp = x < 0;
              x = std::abs(x);
              if (x >= 1000) snprintf(buf, sizeof(buf), "%s%.1f kW", exp ? "-" : "+", x / 1000.0f);
              else snprintf(buf, sizeof(buf), "%s%.0f W", exp ? "-" : "+", x);
              return {std::string(buf)};
            }
            return {std::string("-- W")};
          text2_color: !lambda |-
            if (id(ha_grid_power).has_state()) {
              return id(ha_grid_power).state < 0
                ? optional<std::string>{"#44FF88"}
                : optional<std::string>{"#FF4444"};
            }
            return {std::string("#888888")};

    # Position 3 — UPS Battery
    # gauge with color-coded arc: green > 80%, orange > 30%, red below
    - position: 3
      page: 0
      layouts:
        - widget: gauge
          min: 0.0
          max: 100.0
          value: !lambda |-
            if (id(ha_ups_battery).has_state() && !isnan(id(ha_ups_battery).state)) {
              char buf[8];
              snprintf(buf, sizeof(buf), "%.0f", id(ha_ups_battery).state);
              return {std::string(buf)};
            }
            return {std::string("0")};
          graph_color: !lambda |-
            if (id(ha_ups_battery).has_state()) {
              float pct = id(ha_ups_battery).state;
              if (pct > 80) return {std::string("#44CC44")};
              if (pct > 30) return {std::string("#FFAA00")};
              return {std::string("#FF2222")};
            }
            return {std::string("#444444")};
          color: "#1A1A2E"
          icon_id: "battery-high"
          icon_color: "#44CC44"
          text: "UPS"
          text_color: "#FFFFFF"
          text2: !lambda |-
            if (id(ha_ups_battery).has_state() && !isnan(id(ha_ups_battery).state)) {
              char buf[8];
              snprintf(buf, sizeof(buf), "%.0f %%", id(ha_ups_battery).state);
              return {std::string(buf)};
            }
            return {std::string("-- %")};
          text2_color: "#AAAAAA"

    # =========================================================================
    # PAGE 1: Climate
    # =========================================================================

    # Position 0 — Living Room Temperature (line graph with history)
    - position: 0
      page: 1
      layouts:
        - widget: line_graph
          min: 15.0
          max: 30.0
          size: 30          # keep 30 data points in the scrolling buffer
          value: !lambda |-
            if (id(ha_temp_living).has_state() && !isnan(id(ha_temp_living).state)) {
              char buf[8];
              snprintf(buf, sizeof(buf), "%.1f", id(ha_temp_living).state);
              return {std::string(buf)};
            }
            return {std::string("0")};
          graph_color: "#FF6644"
          color: "#1A1A2E"
          icon_id: "home-thermometer"
          icon_color: "#FF6644"
          text: "Living"
          text_color: "#FFFFFF"
          text2: !lambda |-
            if (id(ha_temp_living).has_state() && !isnan(id(ha_temp_living).state)) {
              char buf[8];
              snprintf(buf, sizeof(buf), "%.1f C", id(ha_temp_living).state);
              return {std::string(buf)};
            }
            return {std::string("-- C")};
          text2_color: "#AAAAAA"

    # Position 1 — Outdoor Temperature (line graph)
    - position: 1
      page: 1
      layouts:
        - widget: line_graph
          min: -10.0
          max: 40.0
          size: 30
          value: !lambda |-
            if (id(ha_temp_outdoor).has_state() && !isnan(id(ha_temp_outdoor).state)) {
              char buf[8];
              snprintf(buf, sizeof(buf), "%.1f", id(ha_temp_outdoor).state);
              return {std::string(buf)};
            }
            return {std::string("0")};
          graph_color: "#44AAFF"
          color: "#1A1A2E"
          icon_id: "thermometer-lines"
          icon_color: "#44AAFF"
          text: "Outdoor"
          text_color: "#FFFFFF"
          text2: !lambda |-
            if (id(ha_temp_outdoor).has_state() && !isnan(id(ha_temp_outdoor).state)) {
              char buf[8];
              snprintf(buf, sizeof(buf), "%.1f C", id(ha_temp_outdoor).state);
              return {std::string(buf)};
            }
            return {std::string("-- C")};
          text2_color: "#AAAAAA"

    # Position 2 — Humidity
    # Conditional widget switch: entity_view normally, gauge when humidity is high
    - position: 2
      page: 1
      layouts:
        # Show gauge as warning when humidity > 70%
        - widget: gauge
          when: !lambda |-
            return id(ha_humidity).has_state() && id(ha_humidity).state > 70;
          min: 0.0
          max: 100.0
          value: !lambda |-
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f", id(ha_humidity).state);
            return {std::string(buf)};
          graph_color: "#FF6644"
          color: "#2E1A1A"
          icon_id: "water-alert"
          icon_color: "#FF6644"
          text: "Humid!"
          text_color: "#FF8866"
          text2: !lambda |-
            char buf[8];
            snprintf(buf, sizeof(buf), "%.0f %%", id(ha_humidity).state);
            return {std::string(buf)};
          text2_color: "#CC4422"

        # Normal display
        - widget: entity_view
          color: "#1A1A2E"
          icon_id: "water-percent"
          icon_color: "#44AAFF"
          text: "Humidity"
          text_color: "#FFFFFF"
          text2: !lambda |-
            if (id(ha_humidity).has_state() && !isnan(id(ha_humidity).state)) {
              char buf[8];
              snprintf(buf, sizeof(buf), "%.0f %%", id(ha_humidity).state);
              return {std::string(buf)};
            }
            return {std::string("-- %")};
          text2_color: "#AAAAAA"

    # Position 3 — CO2 Level
    # entity_view with color-coded text based on CO2 level
    - position: 3
      page: 1
      layouts:
        - widget: entity_view
          color: "#1A1A2E"
          icon_id: "molecule-co2"
          icon_color: !lambda |-
            if (id(ha_co2).has_state()) {
              float ppm = id(ha_co2).state;
              if (ppm < 800)  return {std::string("#44CC44")};
              if (ppm < 1200) return {std::string("#FFAA00")};
              return {std::string("#FF4444")};
            }
            return {std::string("#888888")};
          text: "CO2"
          text_color: "#FFFFFF"
          text2: !lambda |-
            if (id(ha_co2).has_state() && !isnan(id(ha_co2).state)) {
              char buf[12];
              snprintf(buf, sizeof(buf), "%.0f ppm", id(ha_co2).state);
              return {std::string(buf)};
            }
            return {std::string("-- ppm")};
          text2_color: !lambda |-
            if (id(ha_co2).has_state()) {
              float ppm = id(ha_co2).state;
              if (ppm < 800)  return {std::string("#44CC44")};
              if (ppm < 1200) return {std::string("#FFAA00")};
              return {std::string("#FF4444")};
            }
            return {std::string("#888888")};

    # Position 5 — Chips: quick overview of all climate values
    - position: 5
      page: 1
      layouts:
        - widget: chips
          color: "#111122"
          chips:
            - icon_id: "home-thermometer-outline"
              label: !lambda |-
                if (id(ha_temp_living).has_state()) {
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%.1fC", id(ha_temp_living).state);
                  return {std::string(buf)};
                }
                return {std::string("--")};
              bg_color: "#2A1A0A"
            - icon_id: "water-percent"
              label: !lambda |-
                if (id(ha_humidity).has_state()) {
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%.0f%%", id(ha_humidity).state);
                  return {std::string(buf)};
                }
                return {std::string("--")};
              bg_color: "#0A1A2A"
            - icon_id: "molecule-co2"
              label: !lambda |-
                if (id(ha_co2).has_state()) {
                  char buf[8];
                  snprintf(buf, sizeof(buf), "%.0f", id(ha_co2).state);
                  return {std::string(buf)};
                }
                return {std::string("--")};
              bg_color: "#1A1A0A"

    # =========================================================================
    # GLOBAL (page: -1) — visible on every page
    # =========================================================================

    # Position 4 — Next Page
    - position: 4
      page: -1
      on_press:
        then:
          - lambda: id(d200).navigate_page_next();
      pressed_style:
        color: "#4444AA"
        icon_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          color: "#111122"
          icon_id: "chevron-right"
          icon_color: "#5555AA"
          text: "NEXT"
          text_color: "#7777CC"

    # Position 9 — Previous Page
    - position: 9
      page: -1
      on_press:
        then:
          - lambda: id(d200).navigate_page_prev();
      pressed_style:
        color: "#4444AA"
        icon_color: "#FFFFFF"
      layouts:
        - widget: entity_view
          color: "#111122"
          icon_id: "chevron-left"
          icon_color: "#5555AA"
          text: "PREV"
          text_color: "#7777CC"

    # Position 10 — Jump to Power page (highlighted when active)
    - position: 10
      page: -1
      on_press:
        then:
          - lambda: id(d200).navigate_page_jump(0);
      pressed_style:
        color: "#FF9944"
        icon_color: "#000000"
      layouts:
        - widget: entity_view
          when: !lambda 'return id(d200).get_current_page() == 0;'
          color: "#2A1A0A"
          icon_id: "lightning-bolt"
          icon_color: "#FF9944"
          text: "Power"
          text_color: "#FF9944"
        - widget: entity_view
          color: "#111111"
          icon_id: "lightning-bolt-outline"
          icon_color: "#444444"
          text: "Power"
          text_color: "#444444"

    # Position 11 — Jump to Climate page (highlighted when active)
    - position: 11
      page: -1
      on_press:
        then:
          - lambda: id(d200).navigate_page_jump(1);
      pressed_style:
        color: "#44BBFF"
        icon_color: "#000000"
      layouts:
        - widget: entity_view
          when: !lambda 'return id(d200).get_current_page() == 1;'
          color: "#0A1A2A"
          icon_id: "thermometer"
          icon_color: "#44BBFF"
          text: "Climate"
          text_color: "#44BBFF"
        - widget: entity_view
          color: "#111111"
          icon_id: "thermometer"
          icon_color: "#444444"
          text: "Climate"
          text_color: "#444444"

    # Position 13 — Status Bar (double-wide, all pages)
    - position: 13
      page: -1
      layouts:
        - widget: status
          items:
            - clock
            - page
          color: "#111122"
          text_color: "#AACCFF"

# =============================================================================
# HA Sensors — replace entity_id values with your own
# =============================================================================
sensor:
  # --- Power page ---
  - platform: homeassistant
    id: ha_server_power
    entity_id: sensor.server_power   # watts

  - platform: homeassistant
    id: ha_solar_power
    entity_id: sensor.solar_power    # watts

  - platform: homeassistant
    id: ha_grid_power
    entity_id: sensor.grid_power     # watts, negative = exporting

  - platform: homeassistant
    id: ha_ups_battery
    entity_id: sensor.ups_battery_charge  # percent 0–100

  # --- Climate page ---
  - platform: homeassistant
    id: ha_temp_living
    entity_id: sensor.living_room_temperature   # °C

  - platform: homeassistant
    id: ha_temp_outdoor
    entity_id: sensor.outdoor_temperature       # °C

  - platform: homeassistant
    id: ha_humidity
    entity_id: sensor.living_room_humidity      # percent

  - platform: homeassistant
    id: ha_co2
    entity_id: sensor.living_room_co2           # ppm

  # --- ESP32 built-in ---
  - platform: wifi_signal
    name: "${friendly_name} WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "${friendly_name} Uptime"
    update_interval: 60s

  - platform: template
    id: current_page_sensor
    name: "${friendly_name} Current Page"
    accuracy_decimals: 0
    lambda: 'return id(d200).get_current_page();'
    update_interval: 5s

binary_sensor:
  - platform: template
    id: d200_connected
    name: "${friendly_name} Connected"
    device_class: connectivity
    lambda: 'return id(d200).is_connected();'

number:
  - platform: template
    name: "${friendly_name} Brightness"
    icon: mdi:brightness-6
    min_value: 0
    max_value: 100
    step: 10
    initial_value: 80
    optimistic: true
    restore_value: true
    set_action:
      then:
        - lambda: id(d200).set_brightness((uint8_t)x);
